# Dependabot configuration for the audit/fix-all post-review pass.
#
# Three ecosystems are tracked:
#   - github-actions: catches force-moved tags on the SHA-pinned actions
#     in workflows/e2e.yml and workflows/release.yml. Without this,
#     pinning to a SHA freezes the binary but freezes any future
#     security fix too.
#   - pip: catches CVE updates in the runtime + test deps (httpx, tqdm,
#     huggingface_hub, respx, hypothesis). Paired with the pip-audit
#     CI step that gates merges on known-CVE deps.
#   - cargo: catches RUSTSEC advisories. Paired with the cargo-deny CI
#     step that enforces the deny.toml policy.
#
# Cooldown is 7 days to avoid pulling a release with a regression that
# hasn't been caught yet — the upstream community typically surfaces
# breakage within a week. `groups` consolidate the PRs so the queue
# doesn't fragment across 10 minor-version bumps.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      python-runtime:
        dependency-type: production
      python-test:
        dependency-type: development

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      rust-runtime:
        dependency-type: production
      rust-dev:
        dependency-type: development

name: Benchmark 10 GiB download

on:
  workflow_dispatch:
    inputs:
      seed:
        description: 'Re-upload the 10 GiB synthetic blob to Hippius before benchmarking (slow; only needed when the blob is missing or stale)'
        type: boolean
        default: false

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (need ~30 GB for two 10 GiB downloads + maybe a seed)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: dtolnay/rust-toolchain@stable

      - name: Build hippius_hub
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip maturin
          .venv/bin/maturin develop --release

      - name: Run 10 GiB benchmark
        env:
          HIPPIUS_TEST_USER: ${{ secrets.HIPPIUS_TEST_USER }}
          HIPPIUS_TEST_PASS: ${{ secrets.HIPPIUS_TEST_PASS }}
          HIPPIUS_TEST_TOKEN: ${{ secrets.HIPPIUS_TEST_TOKEN }}
          SEED: ${{ inputs.seed && '1' || '' }}
        run: .venv/bin/python bench/bench_10gb.py

name: E2E

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:

# Cancel an in-flight e2e run when a PR is force-pushed or when a newer
# commit lands on the same branch. Without this, two PRs hitting
# test/e2e-client at the same time can race on the manifest revision
# and produce 412s that look like real If-Match regressions but are
# actually CI-on-CI contention.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. actions/checkout only needs read access to
# pull the commit. The job inherits no other write scopes (packages,
# pull-requests, statuses) — a hypothetical action with a vulnerable
# dependency cannot use the workflow token to mutate the repo.
permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Job-level permissions repeat the workflow-level read-only stance
    # for defense-in-depth — if a future maintainer relaxes the
    # workflow-level block, the job-level pin still constrains this
    # job specifically.
    permissions:
      contents: read

    steps:
      # Actions pinned to SHAs (not tags) so a hijacked tag retag cannot
      # silently introduce malicious code. Refresh by re-resolving the
      # tag with `gh api repos/<owner>/<repo>/git/refs/tags/<tag>`.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.10'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-05-27
        with:
          toolchain: stable

      - name: Rust unit tests (chunk math + uploader helpers)
        run: cargo test --lib

      - name: Build and install hippius_hub
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip maturin
          .venv/bin/maturin develop --release
          .venv/bin/pip install -e ".[test]"

      - name: Run full test suite (Hippius + HF parity, every PR / release)
        # Secrets are NOT exposed to PRs from forks (GitHub's default for
        # `pull_request` triggers). The conftest `_have_creds()` check
        # detects the empty-env case and skips e2e-marked tests so a fork
        # PR sees offline tests pass and live tests skip — no false fail.
        # See README §"CI secrets" for the full list and how they map to
        # the conftest fixtures (`creds`, `logged_in`).
        env:
          HIPPIUS_TEST_USER: ${{ secrets.HIPPIUS_TEST_USER }}
          HIPPIUS_TEST_PASS: ${{ secrets.HIPPIUS_TEST_PASS }}
          HIPPIUS_TEST_TOKEN: ${{ secrets.HIPPIUS_TEST_TOKEN }}
        run: .venv/bin/pytest -v

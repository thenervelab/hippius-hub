name: E2E

on:
  pull_request:
  push:
    # `staging` runs the full suite (regression) plus the chunked-layout step
    # below, which is gated to this branch only. `main` never emits chunked
    # artifacts in CI — the chunked write path is opt-in this release.
    branches: [main, staging]
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch:

# Cancel an in-flight e2e run when a PR is force-pushed or when a newer
# commit lands on the same branch. Without this, two PRs hitting
# test/e2e-client at the same time can race on the manifest revision
# and produce 412s that look like real If-Match regressions but are
# actually CI-on-CI contention.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. actions/checkout only needs read access to
# pull the commit. The job inherits no other write scopes (packages,
# pull-requests, statuses) — a hypothetical action with a vulnerable
# dependency cannot use the workflow token to mutate the repo.
permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Job-level permissions repeat the workflow-level read-only stance
    # for defense-in-depth — if a future maintainer relaxes the
    # workflow-level block, the job-level pin still constrains this
    # job specifically.
    permissions:
      contents: read

    steps:
      # Actions pinned to SHAs (not tags) so a hijacked tag retag cannot
      # silently introduce malicious code. Refresh by re-resolving the
      # tag with `gh api repos/<owner>/<repo>/git/refs/tags/<tag>`.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.10'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-05-27
        with:
          toolchain: stable

      # Supply-chain gate (Rust side). deny.toml defines the policy:
      # advisories deny + documented ignores, license allowlist,
      # crates.io-only sources, wildcard ban. Paired with the cargo
      # ecosystem entry in .github/dependabot.yml so the merge of a
      # new advisory triggers a Dependabot PR within a week.
      - name: Cargo supply-chain audit
        uses: EmbarkStudios/cargo-deny-action@7343aaf3a9563e7c5e0e8bac3896a292217cb163  # v2.0.19
        with:
          command: check
          arguments: --all-features

      # Clippy gate. The Cargo.toml [lints.clippy] block sets pedantic
      # to warn and the panic-prevention set (unwrap_used, panic,
      # print_stdout, etc.) to deny. Without invoking clippy in CI, that
      # block is documentation; with this step it's enforcement. New
      # .unwrap() or print! in hot paths fails the merge.
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Rust unit tests (chunk math + uploader helpers)
        run: cargo test --lib

      - name: Build and install hippius_hub
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip maturin
          .venv/bin/maturin develop --release
          .venv/bin/pip install -e ".[test]"

      # Supply-chain gate (Python side). Before auditing we bump the
      # known-vulnerable transitive dev-tool deps (pip itself, pygments
      # via pytest's traceback rendering, idna/urllib3/requests via
      # huggingface_hub's transitive surface) to current-stable so CVEs
      # that affect only our test environment — not shipped users —
      # don't gate merges. New CVEs that survive the upgrade ARE
      # surfaced and DO fail CI: pip-audit returns non-zero on any
      # vulnerability finding regardless of `--strict`.
      #
      # `--skip-editable` excludes the in-tree hippius_hub install
      # (`pip install -e ".[test]"` above) from the audit. Without it,
      # pip-audit can't resolve the current local version on PyPI
      # because each release-bump commit predates the PyPI upload.
      #
      # We deliberately do NOT pass `--strict`: it upgrades the
      # "skipped editable" log line into a fatal error, defeating
      # `--skip-editable` entirely. `--strict` only affects warning
      # severity (e.g. "couldn't fetch metadata for package X");
      # actual CVE detection is non-zero regardless, which is the
      # signal we care about.
      - name: Python supply-chain audit
        run: |
          .venv/bin/pip install --upgrade \
            'idna>=3.15' \
            'pygments>=2.20.0' \
            'requests>=2.33.0' \
            'urllib3>=2.7.0'
          .venv/bin/pip install pip-audit==2.10.0
          .venv/bin/pip-audit --skip-editable

      # Runs on every trigger (PR, push to main, tag push, release,
      # dispatch). The `addopts = "-m 'not expensive'"` default in
      # pyproject.toml automatically excludes the expensive marker
      # without needing a CLI flag here.
      #
      # Secrets are NOT exposed to PRs from forks (GitHub's default for
      # `pull_request` triggers). The conftest `_have_creds()` and
      # `_have_console_token()` checks detect the empty-env case and
      # skip e2e-marked tests so a fork PR sees offline tests pass and
      # live tests skip — no false fail. See README §"CI secrets" for
      # the full list and how they map to the conftest fixtures
      # (`creds`, `logged_in`, `console_logged_in`).
      - name: Run full test suite (Hippius + HF parity, every PR / release)
        env:
          HIPPIUS_TEST_USER: ${{ secrets.HIPPIUS_TEST_USER }}
          HIPPIUS_TEST_PASS: ${{ secrets.HIPPIUS_TEST_PASS }}
          HIPPIUS_TEST_TOKEN: ${{ secrets.HIPPIUS_TEST_TOKEN }}
          HIPPIUS_TEST_CONSOLE_TOKEN: ${{ secrets.HIPPIUS_TEST_CONSOLE_TOKEN }}
        run: .venv/bin/pytest -v

      # Chunked-artifact layout e2e — STAGING ONLY, against the test/e2e-client
      # namespace. The chunked WRITE path is opt-in this release (default off)
      # because the reader-side layout guard ships in the same release, so no
      # already-deployed reader carries it. We exercise it only on staging, never
      # main. Setting HIPPIUS_CHUNKED_WRITE=1 both enables the feature AND un-skips
      # the gated live test (test_live_chunked_roundtrip.py). Nothing in production
      # config/deployment changes: chunks are ordinary content-addressed blobs in a
      # test namespace (org-wide trace: chunking is a self-contained client change).
      # `github.ref` is compared to a literal — no untrusted input reaches `run:`.
      - name: Chunked-layout e2e (staging only, test namespace)
        if: github.ref == 'refs/heads/staging'
        env:
          HIPPIUS_CHUNKED_WRITE: '1'
          HIPPIUS_TEST_USER: ${{ secrets.HIPPIUS_TEST_USER }}
          HIPPIUS_TEST_PASS: ${{ secrets.HIPPIUS_TEST_PASS }}
          HIPPIUS_TEST_TOKEN: ${{ secrets.HIPPIUS_TEST_TOKEN }}
        run: .venv/bin/pytest -v tests/test_live_chunked_roundtrip.py

      # Chunked-v2 (pack layout) e2e — STAGING ONLY. Opts into v2 via
      # HIPPIUS_CHUNKED_LAYOUT=v2 (which also un-skips the gated live test) to
      # exercise the native pack upload/download + re-upload dedup against the
      # test/e2e-client namespace. v2 is a new layout value, so a reader that
      # predates it refuses it loudly — never on main.
      - name: Chunked-v2 pack-layout e2e (staging only, test namespace)
        if: github.ref == 'refs/heads/staging'
        env:
          HIPPIUS_CHUNKED_WRITE: '1'
          HIPPIUS_CHUNKED_LAYOUT: v2
          HIPPIUS_TEST_USER: ${{ secrets.HIPPIUS_TEST_USER }}
          HIPPIUS_TEST_PASS: ${{ secrets.HIPPIUS_TEST_PASS }}
          HIPPIUS_TEST_TOKEN: ${{ secrets.HIPPIUS_TEST_TOKEN }}
        run: .venv/bin/pytest -v tests/test_live_chunked_v2_roundtrip.py

      # Expensive suite: on-chain subscribe/cancel, robot rotation,
      # publicity toggle (quota resize). Only runs on release events,
      # manual dispatch, or tag pushes. `-m expensive` overrides the
      # default `not expensive` from addopts (pytest's last -m wins).
      # Each test additionally gates on its own HIPPIUS_TEST_ALLOW_*
      # env var, so even this step is a no-op if the secret is unset —
      # a release intentionally not meant to mutate prod state still
      # skips them.
      - name: Run expensive suite (release / manual / tag only)
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        env:
          HIPPIUS_TEST_USER: ${{ secrets.HIPPIUS_TEST_USER }}
          HIPPIUS_TEST_PASS: ${{ secrets.HIPPIUS_TEST_PASS }}
          HIPPIUS_TEST_TOKEN: ${{ secrets.HIPPIUS_TEST_TOKEN }}
          HIPPIUS_TEST_CONSOLE_TOKEN: ${{ secrets.HIPPIUS_TEST_CONSOLE_TOKEN }}
          HIPPIUS_TEST_ALLOW_CHAIN: ${{ secrets.HIPPIUS_TEST_ALLOW_CHAIN }}
          HIPPIUS_TEST_ALLOW_PROD_MUTATION: ${{ secrets.HIPPIUS_TEST_ALLOW_PROD_MUTATION }}
          HIPPIUS_TEST_ALLOW_TOKEN_ROTATE: ${{ secrets.HIPPIUS_TEST_ALLOW_TOKEN_ROTATE }}
        run: .venv/bin/pytest -v -m expensive

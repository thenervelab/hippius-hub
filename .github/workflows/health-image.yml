name: Build health-monitor image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & push hippius-hub-health
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=manual-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry.hippius.com
        uses: docker/login-action@v3
        with:
          registry: registry.hippius.com
          username: ${{ secrets.HIPPIUS_REGISTRY_USERNAME }}
          password: ${{ secrets.HIPPIUS_REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            registry.hippius.com/hippius-hub-health:${{ steps.meta.outputs.version }}
            registry.hippius.com/hippius-hub-health:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

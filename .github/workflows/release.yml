name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Default to read-only. The `release` job overrides this to `contents:
# write` since action-gh-release needs to publish artifacts. build-wheels
# only needs to clone + build, so it inherits the read-only default.
permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      # SHA pins — see e2e.yml header comment for the refresh procedure.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.10'

      - name: Build wheels
        uses: PyO3/maturin-action@423a6347767a8b16e65c2a7a7042e4a921528da8  # v1
        with:
          command: build
          args: --release --out dist
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-wheels
    # action-gh-release writes the release record; PyPI upload is a
    # separate auth path via MATURIN_PYPI_TOKEN, so it does not need
    # repo write scope. contents: write is the minimum to create a
    # GitHub release.
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download wheels
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4

      - name: Publish to PyPI
        uses: PyO3/maturin-action@423a6347767a8b16e65c2a7a7042e4a921528da8  # v1
        with:
          command: upload
          args: --skip-existing wheels-*/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      - name: Release on GitHub
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: wheels-*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

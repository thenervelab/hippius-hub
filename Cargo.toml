[package]
name = "hippius_core"
version = "0.1.0"
edition = "2021"

[lib]
name = "hippius_core"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.20", features = ["extension-module"] }
tokio = { version = "1.35", features = ["rt", "rt-multi-thread", "macros", "fs", "time"] }
reqwest = { version = "0.11", features = ["json", "stream"] }
futures = "0.3"
sha2 = "0.10"
hex = "0.4"

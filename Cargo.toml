[package]
name = "hippius_core"
version = "0.4.7"
edition = "2021"

[lib]
name = "hippius_core"
# rlib makes the crate consumable by Rust's own test harness (`cargo test`).
# cdylib is the Python-extension target.
crate-type = ["cdylib", "rlib"]

# `extension-module` is behind a default feature so the wheel build (maturin,
# which uses default features) links as a Python extension, while
# `cargo test --no-default-features` can link libpython and run the Rust unit
# tests (extension-module otherwise disables that linkage).
[features]
default = ["extension-module"]
extension-module = ["pyo3/extension-module"]

[dependencies]
pyo3 = { version = "0.20", features = ["abi3", "abi3-py38"] }
tokio = { version = "1.35", features = ["rt", "rt-multi-thread", "macros", "fs", "time", "net"] }
tokio-util = { version = "0.7", features = ["codec"] }
reqwest = { version = "0.11", default-features = false, features = ["json", "stream", "rustls-tls"] }
indicatif = "0.17.8"
futures = "0.3"
hex = "0.4"
# Structured logging gated behind RUST_LOG / HIPPIUS_DEBUG. When no filter is
# set we never install a subscriber, so the macros compile to runtime no-ops.
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
# Diagnostics probe: a raw TLS handshake (timed separately from reqwest) needs
# these directly. Versions already resolve in-tree via reqwest's rustls-tls,
# so they add no new transitive crates.
tokio-rustls = "0.24"
webpki-roots = "0.25"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(all(target_arch = "x86_64", target_os = "linux"))'.dependencies]
sha2 = { version = "0.10", features = ["asm"] }

[target.'cfg(not(all(target_arch = "x86_64", target_os = "linux")))'.dependencies]
sha2 = "0.10"
